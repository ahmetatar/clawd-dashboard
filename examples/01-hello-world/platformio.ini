; clawd examples — 01 Hello World
; CYD / ESP32-2432S028R üzerinde TFT_eSPI ile ekrana "Hello, clawd!" yazar.
; Pinler tipik CYD revizyonu içindir; ekran beyaz/ters/renkleri bozuk gelirse
; önce buradaki TFT_* flag'lerini ve TFT_RGB_ORDER / TFT_INVERSION_* satırlarını gözden geçir.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
  bodmer/TFT_eSPI@^2.5.43

build_flags =
  ; --- TFT_eSPI'ye "ayar dosyası kullanma, pinleri buradan al" de ---
  -D USER_SETUP_LOADED=1
  -D ILI9341_2_DRIVER=1

  ; --- Ekran çözünürlüğü ---
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320

  ; --- CYD SPI pinleri (ekran) ---
  -D TFT_MISO=12
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=-1
  -D TFT_BL=21
  -D TFT_BACKLIGHT_ON=HIGH

  ; --- Renk düzeni / ters çevirme (renkler yanlışsa bunlarla oyna) ---
  ; -D TFT_RGB_ORDER=TFT_BGR
  ; -D TFT_INVERSION_ON=1

  ; --- Fontlar ---
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1

  ; --- SPI hızı ---
  -D SPI_FREQUENCY=55000000
