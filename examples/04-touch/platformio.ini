; clawd examples — 04 Touch (XPT2046 dokunmatik + kalibrasyon)
; CYD'de dokunmatik, ekrandan AYRI bir SPI hattindadir (en bilinen gotcha).
; TFT_eSPI (ekran) + XPT2046_Touchscreen (dokunmatik) birlikte kullanilir.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
  bodmer/TFT_eSPI@^2.5.43
  https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

build_flags =
  ; --- TFT (01-hello-world ile ayni CYD pin recetesi) ---
  -D USER_SETUP_LOADED=1
  -D ILI9341_2_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320
  -D TFT_MISO=12
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=-1
  -D TFT_BL=21
  -D TFT_BACKLIGHT_ON=HIGH
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1
  -D SPI_FREQUENCY=55000000
