; clawd — ana uygulama (CYD / ESP32-2432S028R)
; Fiziksel Claude Code maskotu. WiFi uzerinden olay (POST /e) alir, 5 ifade
; animasyonuyla tepki verir. ILK OZELLIK: guc yonetimi (idle -> kis -> uyku,
; event/dokunma ile uyan). 5 animasyon + ag yigini default partition'a sigmaz
; -> huge_app (3MB app, OTA yok).

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv

lib_deps =
  bodmer/TFT_eSPI@^2.5.43
  https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
  esp32async/AsyncTCP
  esp32async/ESPAsyncWebServer
  bblanchon/ArduinoJson@^7

build_flags =
  -D USER_SETUP_LOADED=1
  -D ILI9341_2_DRIVER=1
  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320
  -D TFT_MISO=12
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=-1
  -D TFT_BL=21
  -D TFT_BACKLIGHT_ON=HIGH
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1
  -D SPI_FREQUENCY=55000000
